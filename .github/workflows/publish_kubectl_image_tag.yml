name: Build and Publish Kubectl Image on Using Semver Tag

on:
  push:
    tags:
      - 'kubectl-v*'
    paths:
      - Dockerfile.kubectl

jobs:
  publish:
    name: Publish Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2

      - name: Extract Version Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/kubectl-v}" >> $GITHUB_ENV

      - name: Publish Kubectl Image
        uses: Ferlab-Ste-Justine/action-push-image@v2
        with:
          username: ${{ secrets.FERLAB_DOCKER_HUB_USER }}
          password: ${{ secrets.FERLAB_DOCKER_HUB_TOKEN }}
          image: ferlabcrsj/kubectl
          tag_format: "${{ env.VERSION }}"
          dockerfile: "Dockerfile.kubectl"