name: Build and Publish Python Requests Custom Image on Using Semver Tag

on:
  push:
    tags:
      - 'python-requests-custom-v*'
    paths:
      - Dockerfile.python-requests-custom

jobs:
  build:
    name: Publish Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2

      - name: Extract Version Tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/python-requests-custom-v}" >> $GITHUB_ENV

      - name: Publish Ferlease Image
        uses: Ferlab-Ste-Justine/action-push-image@v2
        with:
          username: ${{ secrets.FERLAB_DOCKER_HUB_USER }}
          password: ${{ secrets.FERLAB_DOCKER_HUB_TOKEN }}
          image: ferlabcrsj/python-requests-custom
          tag_format: "${{ env.VERSION }}"
          dockerfile: "Dockerfile.python-requests-custom"