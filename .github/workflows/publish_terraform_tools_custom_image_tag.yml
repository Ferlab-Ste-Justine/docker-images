name: Build and Publish Terraform Tools Custom Image on Tag

on:
  push:
    tags:
      - 'terraform-tools-custom-v*'
    paths:
      - Dockerfile.terraform-tools-custom

jobs:
  build:
    name: Publish Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2

      - name: Publish Image with Latest Tag
        uses: Ferlab-Ste-Justine/action-push-image@v2
        with:
          username: ${{ secrets.FERLAB_DOCKER_HUB_USER }}
          password: ${{ secrets.FERLAB_DOCKER_HUB_TOKEN }}
          image: ferlabcrsj/terraform-tools-custom
          tag_format: "latest"
          dockerfile: "Dockerfile.terraform-tools-custom"
